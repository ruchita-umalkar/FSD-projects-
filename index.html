<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">My Blog</div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link active" data-section="home">Home</a></li>
                <li><a href="#new-post" class="nav-link" data-section="new-post">New Post</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Home Section - Blog Posts List -->
        <section id="home" class="section active">
            <div class="section-header">
                <h1>Welcome to My Blog</h1>
                <p>Sharing thoughts, ideas, and experiences</p>
            </div>

            <div id="posts-container" class="posts-grid">
                <!-- Blog posts will be dynamically inserted here -->
            </div>

            <div id="empty-state" class="empty-state">
                <p>No blog posts yet. <a href="#new-post" class="nav-link" data-section="new-post">Create your first post!</a></p>
            </div>
        </section>

        <!-- New Post Section - Form -->
        <section id="new-post" class="section">
            <div class="section-header">
                <h1>Create New Post</h1>
                <p>Share your thoughts with the world</p>
            </div>

            <div class="form-container">
                <form id="post-form" class="post-form">
                    <div class="form-group">
                        <label for="post-title">Post Title *</label>
                        <input type="text" id="post-title" placeholder="Enter post title" required>
                    </div>

                    <div class="form-group">
                        <label for="post-image">Image URL *</label>
                        <input type="url" id="post-image" placeholder="https://example.com/image.jpg" required>
                        <div id="image-preview" class="image-preview"></div>
                    </div>

                    <div class="form-group">
                        <label for="post-content">Post Content *</label>
                        <textarea id="post-content" placeholder="Write your post content here..." rows="10" required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Publish Post</button>
                        <button type="reset" class="btn btn-secondary">Clear Form</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Blog Post Detail Section -->
        <section id="post-detail" class="section">
            <button class="btn-back" onclick="showSection('home')">← Back to Posts</button>
            <article id="post-content-detail" class="post-detail">
                <!-- Full blog post will be displayed here -->
            </article>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 My Personal Blog. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
